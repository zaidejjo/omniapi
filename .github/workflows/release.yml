name: Release
on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ── Build the oma CLI/TUI binary for Linux ─────────────────
jobs:
  cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      # Must build @omniapi/core first so workspace dep resolves
      - name: Build monorepo dependencies
        run: bun run build:core

      - name: Build oma binary
        working-directory: packages/cli
        run: bun build --compile ./bin/om.ts --outfile=oma-linux-x64

      - name: Upload oma to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/oma-linux-x64
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build Tauri desktop app for Linux (.deb) ──────────────
  desktop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "packages/gui/src-tauri -> target"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: bun install

      - name: Build monorepo dependencies & frontend
        run: |
          bun run build:core
          bun run --cwd packages/gui build

      - name: Build Tauri App
        run: bun run --cwd packages/gui tauri build --bundles deb

      - name: Upload Desktop .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/gui/src-tauri/target/release/bundle/deb/*.deb
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish Linux assets to AUR ───────────────────────────
  aur-publish:
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        pkg:
          - name: omniapi-desktop-bin
            artifact: "omniapi_*_amd64.deb"
          - name: omniapi-cli-bin
            artifact: "oma-linux-x64"

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write key to ~/.ssh/id_aur (matches local dev setup)
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur

          # Configure SSH to use id_aur specifically for AUR
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/id_aur
            User aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.pkg.artifact }}" \
            --dir /tmp/artifact

      - name: Compute sha256sum
        id: checksum
        run: |
          echo "sha256=$(sha256sum /tmp/artifact/* | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # 👈 التعديل المهم هنا فقط (توليد .SRCINFO داخل حاوية Arch)
      - name: Publish to AUR (${{ matrix.pkg.name }})
        env:
          PKG: ${{ matrix.pkg.name }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          set -eu

          git config --global user.name "OmniAPI Bot"
          git config --global user.email "actions@github.com"

          # Clone AUR repo
          git clone "ssh://aur@aur.archlinux.org/${PKG}.git" /tmp/aur
          cd /tmp/aur

          # Copy PKGBUILD template from workspace
          cp "${GITHUB_WORKSPACE}/aur/${PKG}/PKGBUILD" ./PKGBUILD

          # Replace placeholder repo URL with actual GitHub repository
          sed -i "s|YOUR_GITHUB_USERNAME/omniapi|${{ github.repository }}|" ./PKGBUILD

          # Update version field
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ./PKGBUILD
          # Reset pkgrel to 1 for a new version
          sed -i "s/^pkgrel=.*/pkgrel=1/" ./PKGBUILD

          # Update sha256sums with computed value
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA256}')|" ./PKGBUILD

          # Generate .SRCINFO via official archlinux container to ensure valid formatting
          docker run --rm -v "$(pwd):/pkg" -w /pkg archlinux:base bash -c "
            useradd -m builder && \
            chown -R builder:builder /pkg && \
            su builder -c 'makepkg --printsrcinfo' > /pkg/.SRCINFO
          "

          sudo chown -R $USER:$USER /tmp/aur
          # Commit and push to AUR
          git add PKGBUILD .SRCINFO
          git commit -m "bump to ${VERSION}"
          git push
